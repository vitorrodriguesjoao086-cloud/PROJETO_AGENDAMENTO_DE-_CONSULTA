{% extends "base.html" %}
{% block title %}{% if editing %}Editar{% else %}Novo{% endif %} Paciente - MedAgenda{% endblock %}
{% block page_title %}{% if editing %}Editar Paciente{% else %}Novo Paciente{% endif %}{% endblock %}

{% block content %}
<div class="max-w-lg">
  <div class="bg-white rounded-xl border border-gray-200 p-6">
    <form method="POST" novalidate>
      {% csrf_token %}
      <div class="space-y-4 mb-6">
        <div>
          <label class="block text-xs font-medium text-gray-700 mb-1">Nome completo *</label>
          <input type="text" name="full_name" required value="{{ form_data.full_name }}"
            class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg outline-none focus:border-green-500">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-medium text-gray-700 mb-1">Telefone</label>
            <input type="tel" name="phone" value="{{ form_data.phone }}"
              class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg outline-none focus:border-green-500">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-700 mb-1">Nascimento</label>
            <input type="date" name="birth_date" value="{{ form_data.birth_date }}"
              class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg outline-none focus:border-green-500">
          </div>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-700 mb-1">E-mail</label>
          <input type="email" name="email" value="{{ form_data.email }}"
            class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg outline-none focus:border-green-500">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-700 mb-1">Observacoes</label>
          <textarea name="notes" rows="3" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg outline-none focus:border-green-500 resize-none">{{ form_data.notes }}</textarea>
        </div>
      </div>
      <div class="flex gap-3 pt-4 border-t border-gray-100">
        <button type="submit" class="px-5 py-2 text-sm text-white rounded-lg btn-primary font-medium">
          {% if editing %}Salvar{% else %}Cadastrar paciente{% endif %}
        </button>
        <a href="{% url 'pacientes_lista' %}" class="px-4 py-2 text-sm border border-gray-200 rounded-lg text-gray-600 hover:bg-gray-50">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
